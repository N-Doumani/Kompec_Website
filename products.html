<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منتجات KOMPEC | التميز في الإكسسوارات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="custom-bg custom-text font-sans antialiased transition-colors duration-300">

    <header class="sticky top-0 z-50 custom-bg/90 backdrop-blur-md border-b custom-border transition-colors duration-300">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center relative">
            <a href="index.html" class="flex items-center space-x-3 space-x-reverse">
                <img src="images/logo.png" alt="KOMPEC Logo" class="w-10 h-10 object-contain shadow-[0_0_15px_rgba(37,99,235,0.3)]">
                <span class="text-xl font-black tracking-widest mr-2 custom-text">KOMPEC</span>
            </a>
            
            <nav class="hidden md:flex items-center space-x-8 space-x-reverse text-sm font-medium">
                <a href="index.html" class="custom-muted hover:text-[#2563eb] transition-colors">الرئيسية</a>
                <a href="index.html#services" class="custom-muted hover:text-[#2563eb] transition-colors">خدمات الصيانة</a>
                <a href="products.html" class="custom-text border-b-2 border-[#2563eb] pb-1 font-bold">منتجاتنا</a>
                <a href="index.html#why-us" class="custom-muted hover:text-[#2563eb] transition-colors">لماذا نحن؟</a>
                
                <button id="theme-toggle" class="p-2 rounded-xl bg-gray-800 text-yellow-400 hover:bg-gray-700 transition">
                    <span id="theme-toggle-icon">☀️</span>
                </button>
                <a href="products-en.html" class="p-2 rounded-xl bg-gray-800 text-white hover:bg-gray-700 transition font-bold text-xs flex items-center justify-center">EN</a>
                <a href="index.html#contact" class="custom-card border custom-border hover:border-[#2563eb] px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-md">تواصل معنا</a>
            </nav>

            <div class="flex items-center space-x-3 space-x-reverse md:hidden">
                <button id="theme-toggle-mobile" class="p-2 rounded-xl bg-gray-800 text-yellow-400 text-xs"><span>☀️</span></button>
                <button id="menu-btn" class="p-2 rounded-xl bg-gray-800 text-white focus:outline-none"><i class="fas fa-bars text-lg" id="menu-icon"></i></button>
            </div>

            <div id="mobile-menu" class="hidden absolute top-full left-0 w-full custom-card border-b custom-border flex flex-col p-6 space-y-4 text-center shadow-xl md:hidden transition-all">
                <a href="index.html" class="mobile-nav-link block font-bold text-sm custom-muted">الرئيسية</a>
                <a href="products.html" class="block font-bold text-sm text-[#2563eb]">منتجاتنا</a>
                <a href="products-en.html" class="block font-bold text-sm custom-muted">English (EN)</a>
            </div>
        </div>
    </header>

    <section class="py-12 text-center reveal">
        <h1 class="text-3xl md:text-5xl font-black custom-text mb-3">كتالوج الإكسسوارات والملحقات</h1>
        <p class="custom-muted text-sm md:text-base">تصفح أفضل العروض والقطع الأصلية المتوفرة في مركزنا</p>
    </section>

    <main id="products-main" class="container mx-auto max-w-6xl px-6 pb-24 space-y-20">
        <section class="reveal">
            <div class="flex items-center space-x-3 space-x-reverse mb-8 border-b custom-border pb-3">
                <i class="fas fa-mouse text-2xl text-[#2563eb]"></i><h2 class="text-2xl font-bold custom-text">ماوسات (Mice)</h2>
            </div>
            <div id="mice-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section class="reveal">
            <div class="flex items-center space-x-3 space-x-reverse mb-8 border-b custom-border pb-3">
                <i class="fas fa-keyboard text-2xl text-[#06b6d4]"></i><h2 class="text-2xl font-bold custom-text">كيبوردات (Keyboards)</h2>
            </div>
            <div id="keyboards-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section class="reveal">
            <div class="flex items-center space-x-3 space-x-reverse mb-8 border-b custom-border pb-3">
                <i class="fas fa-headphones text-2xl text-[#2563eb]"></i><h2 class="text-2xl font-bold custom-text">سماعات (Headsets)</h2>
            </div>
            <div id="headsets-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>

        <section class="reveal">
            <div class="flex items-center space-x-3 space-x-reverse mb-8 border-b custom-border pb-3">
                <i class="fas fa-hdd text-2xl text-[#06b6d4]"></i><h2 class="text-2xl font-bold custom-text">فلاشات وتخزين (Storage)</h2>
            </div>
            <div id="storage-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
