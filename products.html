<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منتجات KOMPEC | التميز في الإكسسوارات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="custom-bg custom-text font-sans antialiased transition-colors duration-300">

    <!-- الهيدر (القائمة الكاملة مع الروابط التي تعود للصفحة الرئيسية) -->
    <header class="sticky top-0 z-50 custom-bg/90 backdrop-blur-md border-b custom-border transition-colors duration-300">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-3 space-x-reverse">
                <img src="images/logo.png" alt="KOMPEC Logo" class="w-10 h-10 object-contain">
                <span class="text-xl font-black tracking-widest custom-text">KOMPEC</span>
            </a>
            
            <nav class="hidden md:flex items-center space-x-8 space-x-reverse text-sm font-medium">
                <a href="index.html" class="custom-muted hover:text-[#2563eb] transition-colors duration-200">الرئيسية</a>
                <a href="index.html#services" class="custom-muted hover:text-[#2563eb] transition-colors duration-200">خدمات الصيانة</a>
                <a href="products.html" class="custom-text border-b-2 border-[#2563eb] pb-1 font-bold">منتجاتنا</a>
                <a href="index.html#why-us" class="custom-muted hover:text-[#2563eb] transition-colors duration-200">لماذا نحن؟</a>
             <button id="theme-toggle" class="p-2 rounded-xl bg-gray-800 text-yellow-400 hover:bg-gray-700 transition">
                <span id="theme-toggle-icon">☀️</span>
            </button>

            <a href="products-en.html" class="p-2 rounded-xl bg-gray-800 text-white hover:bg-gray-700 transition font-bold text-xs flex items-center justify-center">
                EN
            </a>
                
                <a href="index.html#contact" class="custom-card border custom-border hover:border-[#2563eb] px-4 py-2 rounded-xl text-xs font-bold transition-all shadow-md">
                    تواصل معنا
                </a>
            </nav>
        </div>
    </header>

    <section class="py-12 text-center">
        <h1 class="text-3xl md:text-5xl font-black custom-text mb-3">كتالوج الإكسسوارات والملحقات</h1>
    </section>

    <main class="container mx-auto max-w-6xl px-6 pb-24 space-y-20">
        <!-- يمكنك تكرار هذا القسم لجميع فئات المنتجات التي كانت لديك -->
        <section>
            <div class="flex items-center space-x-3 space-x-reverse mb-8 border-b custom-border pb-3">
                <h2 class="text-2xl font-bold custom-text">ماوسات (Mice)</h2>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6">
                <div class="custom-card rounded-2xl border custom-border overflow-hidden group hover:border-[#2563eb] transition-all">
                    <div class="h-44 bg-gray-900 flex items-center justify-center text-gray-600 text-xs">[ صورة الماوس ]</div>
                    <div class="p-5">
                        <h3 class="font-bold custom-text mb-2">ماوس جيمنج احترافي RGB</h3>
                        <div class="flex justify-between items-center">
                            <span class="custom-text font-black text-sm">180,000 ل.س</span>
                            <span class="text-[10px] bg-emerald-500/10 text-emerald-400 px-2 py-1 rounded">متوفر</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

   <script src="script.js"></script>
</body>
</html>
